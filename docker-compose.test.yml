# Universal Laravel Package Tester (Zero-Dockerfile)
# You can copy this file to any Laravel package repository.
# Requires: Docker & Docker Compose
# Usage: docker compose -f docker-compose.test.yml run --rm test

services:
  test:
    image: lorisleiva/laravel-docker:8.4
    user: root
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
    command: >
      sh -c "
      if [ ! -d 'vendor' ]; then
        composer install --no-interaction --prefer-dist
      fi &&
      composer dump-autoload &&
      ./vendor/bin/pest &&
      ./vendor/bin/phpstan analyse src --memory-limit=-1
      "
